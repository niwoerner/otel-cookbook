name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  GO_VERSION: "1.23"
  SERVER_SIDE_BACKEND_URL: https://otel-cookbook.com # will be overwritten through docker compose file to point to localhost on the VM
  NEXT_PUBLIC_BACKEND_URL: https://otel-cookbook.com

jobs:
  build-and-test-backend:
    defaults:
      run:
        working-directory: backend
    runs-on: ubuntu-latest
    name: Build and Test Backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ./vendor
          key: ${{ runner.os }}-go-${{ hashFiles('backend/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download Go modules
        run: go mod download

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.60
          working-directory: backend # needed - see this issue: https://github.com/golangci/golangci-lint-action/issues/369#issuecomment-2094494008
      
      - name: Go Vulnerability Check
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: ${{ env.GO_VERSION }}
          go-package: ./...
          work-dir: backend

  build-and-test-frontend:
      runs-on: ubuntu-latest
      defaults:
        run:
          working-directory: frontend
      name: Build and Test Frontend
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Set up Node
          uses: actions/setup-node@v4
          with:
            node-version: 20

        - name: Cache dependencies
          uses: actions/cache@v3
          with:
            path: ~/.npm
            key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
            restore-keys: |
              ${{ runner.os }}-npm-

        - name: Install dependencies
          run: npm ci

        - name: Lint
          run: npm run lint

  validate-nginx-config:
      runs-on: ubuntu-latest
      name: Validate Nginx Config
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Run Gixy Docker command
          run: |
            docker run --rm -v "${{ github.workspace }}/deployment/nginx/conf.d/app.conf:/etc/nginx/conf/nginx.conf" getpagespeed/gixy /etc/nginx/conf/nginx.conf