name: Deploy - Frontend and Backend

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

env: 
  REGISTRY: ghcr.io
  SERVER_SIDE_BACKEND_URL: https://otel-cookbook.com # will be overwritten through docker compose file to point to localhost on the VM
  NEXT_PUBLIC_BACKEND_URL: https://otel-cookbook.com
  TAG: 0.1.0-${{ github.sha }} # update tag for new version release
    
jobs:
  build-frontend-docker-image:
    runs-on: ubuntu-latest
    name: Build Frontend Docker Image
    if: ${{ github.event.workflow_run.head_branch == 'main' }}
    environment:
      name: prod 
    env: 
      IMAGE_NAME: ${{ github.repository }}/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}
          context: ./frontend
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache,mode=max
          build-args: |
            "NEXT_PUBLIC_BACKEND_URL=${{ env.NEXT_PUBLIC_BACKEND_URL }}"
            "SERVER_SIDE_BACKEND_URL=${{ env.SERVER_SIDE_BACKEND_URL }}"
            "GH_API_TOKEN=${{ secrets.GH_API_TOKEN }}"

  deploy-frontend:
    runs-on: ubuntu-latest
    name: Deploy Frontend
    needs: build-frontend-docker-image
    if: ${{ github.event.workflow_run.head_branch == 'main' }}
    environment:
      name: prod 
    steps:
      - name: Checkout
        uses: actions/checkout@v4

  build-backend-docker-image:
    runs-on: ubuntu-latest
    name: Build Backend Docker Image
    if: ${{ github.event.workflow_run.head_branch == 'main' }}
    environment:
      name: prod 
    env: 
      IMAGE_NAME: ${{ github.repository }}/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}
          context: ./backend
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache,mode=max

  deploy-backend:
    runs-on: ubuntu-latest
    name: Deploy Backend
    needs: build-backend-docker-image
    if: ${{ github.event.workflow_run.head_branch == 'main' }}
    environment:
      name: prod 
    steps:
      - name: Checkout
        uses: actions/checkout@v4