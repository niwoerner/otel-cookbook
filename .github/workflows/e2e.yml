          - name: docker-debug-mode-default-components
            body: >
              {"BuilderConfig":{"collectorName":"my-otel-collector","version":"","description":"collector description","outputPath":"./otelcol-dev","debugMode":true,"runConfig":"docker"},"CollectorConfig":{"Ports":"4317","DockerImageName":"my-otel-collector","Manifest":"# Minimal OpenTelemetry Collector Configuration\nreceivers:\n  otlp:\n    protocols:\n      grpc: \n        endpoint: \"0.0.0.0:4317\"\n      http: \n        endpoint: \"0.0.0.0:4318\"\n\nexporters:\n  debug:\n    verbosity: detailed\n\nservice:\n  pipelines:\n    traces:\n      receivers: [otlp]\n      exporters: [debug]\n    metrics:\n      receivers: [otlp]\n      exporters: [debug]\n    logs:\n      receivers: [otlp]\n      exporters: [debug]"},"Receivers":[{"type":"Receiver","name":"otlpreceiver","moduleUrl":"go.opentelemetry.io/collector/receiver/otlpreceiver","githubUrl":"https://github.com/open-telemetry/opentelemetry-collector/tree/main/receiver/otlpreceiver","version":"v0.119.0"}],"Exporters":[{"type":"Exporter","name":"debugexporter","moduleUrl":"go.opentelemetry.io/collector/exporter/debugexporter","githubUrl":"https://github.com/open-telemetry/opentelemetry-collector/tree/main/exporter/debugexporter","version":"v0.119.0"}],"Processors":[],"Extensions":[],"Providers":[],"Connectors":[]}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Test - ${{ matrix.request.name }}
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          set -xv

          curl 'https://otel-cookbook.com/server/otelcol/config/start' \
              -H 'cache-control: no-cache' \
              -H 'content-type: application/json' \
              -H 'origin: https://otel-cookbook.com' \
              -H 'referer: https://otel-cookbook.com/preview' \
              --data-raw '${{ matrix.request.body }}' > run.sh

          chmod +x run.sh
          cat run.sh

          export PATH="$HOME/go/bin:$PATH"

          ./run.sh &
          SERVER_PID=$!

          max_attempts=240
          attempt=1
          while ! { nc -z localhost 4317 && nc -z localhost 4318; } ; do
            echo "Waiting for collector to be ready (attempt $attempt)..."
            sleep 8
            if [ $attempt -ge $max_attempts ]; then
                echo "Error: Collector did not become available after $((max_attempts * 2)) seconds." >&2
                kill $SERVER_PID
                exit 1
            fi
            attempt=$((attempt + 1))
          done

          echo "Collector is up and running."

          go install github.com/open-telemetry/opentelemetry-collector-contrib/cmd/telemetrygen@latest
          export PATH="$HOME/go/bin:$PATH"

          telemetrygen traces --traces 5 --otlp-insecure

          sleep 5

          echo "Stopping the HTTP server..."
          kill $SERVER_PID
          wait $SERVER_PID || true
          echo "HTTP server stopped."
