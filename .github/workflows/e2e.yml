name: E2E

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'  # Every day at 8am UTC
  # workflow_run:
  #   workflows: ["CD"]
  #   types:
  #     - completed

jobs:
  e2e:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        request:
          - name: binary-debug-mode-default-components
